<?xml version="1.0" encoding="UTF-8"?>
<!--
  1200×630 social card.

  At build time, scripts/build-brand-assets.mjs substitutes the
  __ICON_BASE64__ placeholder below with the real upstream Fibe icon
  (icon-192.png), base64-encoded, before resvg renders the PNG. This
  way the OG card always uses the actual Fibe brand mark without
  committing megabytes of base64 into source control.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14141c"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#a78bfa" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bottomBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6b4ce9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Brand mark — real Fibe icon, embedded at build time -->
  <image x="80" y="80" width="120" height="120"
         href="data:image/png;base64,__ICON_BASE64__"/>

  <!-- Wordmark -->
  <text x="220" y="170"
        font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="68" font-weight="700" fill="#f9fafb">Fibe</text>

  <!-- Headline -->
  <text x="80" y="320"
        font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="70" font-weight="700" fill="#f9fafb">User guide &amp; skills</text>

  <!-- Tagline (hand-wrapped) -->
  <text x="80" y="400"
        font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="32" font-weight="400" fill="#c5c9d4">Docker environments, AI Genies,</text>
  <text x="80" y="442"
        font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="32" font-weight="400" fill="#c5c9d4">and reusable templates.</text>

  <!-- Footer URL -->
  <text x="80" y="570"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        font-size="22" font-weight="400" fill="#c5c9d4">whats.fibe.gg</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="622" width="1200" height="8" fill="url(#bottomBar)"/>
</svg>
